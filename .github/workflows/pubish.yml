name: Automated Release and Publish

on:
  push:
    branches:
      - main

# Required permissions for semantic-release to create tags, releases, and status checks
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all git history so semantic-release can read tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Build
        run: pnpm build

      - name: Run Tests
        run: pnpm test

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Generated automatically by GitHub
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # You must add this secret manually
        run: pnpm exec semantic-release
